name: Build & Deploy Storefront Template

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd storefront && bun install --frozen-lockfile

      - name: Create template archive
        run: tar -czf storefront-template.tar.gz -C storefront .

      - name: Check archive size
        run: ls -lh storefront-template.tar.gz

      - name: Upload as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: template-latest
          name: Storefront Template (latest)
          files: storefront-template.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Upload to Fly volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Uploading storefront template to Fly volume..."
          cat storefront-template.tar.gz | flyctl ssh console \
            --app amboras-orchestrator \
            -C "cat > /app/workspaces/storefront-template.tar.gz"
          echo "Verifying upload..."
          flyctl ssh console \
            --app amboras-orchestrator \
            -C "ls -lh /app/workspaces/storefront-template.tar.gz"
          echo "✅ Template uploaded to Fly volume"
